{{ $services := index site.Data site.Language.Lang "services" }}


<section
  id="our-services"
  class="flex flex-col items-center justify-center px-4">
  <div class="mt-28 flex flex-col items-center justify-center">
    <h3
      class="text-center text-3xl md:text-4xl font-semibold text-[#181c31] font-[Outfit]">
      {{ i18n "our_services.tagline" }}
    </h3>
    <p class="mt-3 max-w-xs text-center text-gray-500 md:max-w-lg">
      {{ i18n "our_services.short_description" }}
    </p>
  </div>

  <!-- GRID CONTAINER -->
  <div
    class="mt-16 grid w-full max-w-6xl grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
    {{ range $services.services }}
      <div
        class="h-full rounded-[14px] bg-gray-200/80 p-0.5 pt-4 transition-all duration-300 hover:-translate-y-1">
        <div
          class="relative flex h-full flex-col items-center rounded-xl bg-white p-6 pb-10">
          <div class="absolute -top-6 rounded-full bg-[#4e6bff] p-3">
            <img src="{{ .icon }}" alt="{{ .name }}" />
          </div>

          <h3
            class="mt-10 text-center text-base font-semibold text-[#181c31] font-[Outfit]">
            {{ .name }}
          </h3>

          <p class="mt-6 text-center text-gray-500 flex-grow">
            {{ .description }}
          </p>
        </div>
      </div>
    {{ end }}
  </div>
</section>

<header id="header" class="py-7 w-full z-[9999] left-0 top-0 fixed">
  <div
    class="bg-white !h-auto max-h-[400px] overflow-y-scroll rounded-md mt-4 p-7 shadow backdrop-blur !bg-[#4e6bff] !py-4 !text-[#79808a] !visible hidden"></div>
  <div
    class="2xl:px-0 lg:flex md:px-8 px-4 justify-between items-center max-w-[86.875rem] mx-auto relative">
    <!-- Logo -->
    <div class="lg:w-1/4 justify-between items-center w-full flex">
      <a href="/">
        <img
          class="h-14"
          src="/images/octabyte-services.png"
          alt="OctaByte Services logo" />
      </a>

      <!-- Mobile Toggle -->
      <button
        class="lg:hidden block mr-3"
        aria-label="Menu"
        onclick="toggleMenu()">
        <span class="relative w-[1.375rem] h-[1.375rem] block">
          <span
            class="absolute w-full h-[2px] bg-black top-0 transition-all"></span>
          <span
            class="absolute w-full h-[2px] bg-black top-2 transition-all"></span>
          <span
            class="absolute w-full h-[2px] bg-black top-4 transition-all"></span>
        </span>
      </button>
    </div>

    <!-- Menu -->
    <div
      id="header-menu"
      class="lg:w-3/4 lg:h-auto h-0 lg:flex lg:visible justify-between items-center w-full invisible">
      <nav>
        <ul class="lg:gap-10 lg:items-center lg:flex-row gap-5 flex flex-col">
          <li>
            <a href="#home" class="hover:text-[#4E6BFF]">
              {{ i18n "header.home" }}
            </a>
          </li>

          <li>
            <a href="#our-services" class="hover:text-[#4E6BFF]">
              {{ i18n "header.our_services" }}
            </a>
          </li>

          <li>
            <a href="#about-us" class="hover:text-[#4E6BFF]">
              {{ i18n "header.about_us" }}
            </a>
          </li>
        </ul>
      </nav>

      <!-- Right Side -->
      <div class="lg:mt-0 gap-6 items-center flex mt-7">
        <a href="#" id="right-side-item-1" class="font-medium text-white">
          Email us contact@octabyte.io
        </a>

        <ul>
          {{ range .Site.Languages }}
            <li>
              <a href="{{ .Lang | relLangURL }}">
                {{ .LanguageName }}
              </a>
            </li>
          {{ end }}
        </ul>

        <a
          href="#contact-us"
          id="right-side-item-2"
          class="bg-[#ffffff26] text-white text-base leading-6 px-[1.87rem] py-3 rounded-full justify-center items-center flex">
          {{ i18n "header.lets_talk" }}
        </a>
      </div>
    </div>
  </div>
</header>

<header id="header" class="py-7 w-full z-[9999] left-0 top-0 fixed">
  <div
    class="bg-white !h-auto max-h-[400px] overflow-y-scroll rounded-md mt-4 p-7 hidden"></div>
  <div
    class="2xl:px-0 lg:flex md:px-8 px-4 justify-between items-center max-w-[86.875rem] mx-auto relative">
    <!-- Logo -->
    <div class="lg:w-1/4 justify-between items-center w-full flex">
      <a href="index.html">
        <img class="dark:hidden" src="images/logo-light.svg" />
        <img class="hidden dark:block" src="images/logo-dark.svg" />
      </a>

      <!-- Mobile Toggle -->
      <button class="lg:hidden block" onclick="toggleMenu()">
        <span class="relative w-[1.375rem] h-[1.375rem] block">
          <span
            class="absolute w-full h-[2px] bg-black top-0 transition-all"></span>
          <span
            class="absolute w-full h-[2px] bg-black top-2 transition-all"></span>
          <span
            class="absolute w-full h-[2px] bg-black top-4 transition-all"></span>
        </span>
      </button>
    </div>

    <!-- Menu -->
    <div
      id="header-menu"
      class="lg:w-3/4 lg:h-auto lg:flex lg:visible justify-between items-center w-full invisible">
      <nav>
        <ul class="lg:gap-10 lg:items-center lg:flex-row gap-5 flex flex-col">
          <li>
            <a href="#" class="hover:text-[#4E6BFF]">Home</a>
          </li>

          <li>
            <a href="#features" class="hover:text-[#4E6BFF]">Features</a>
          </li>

          <li>
            <a href="#support" class="hover:text-[#4E6BFF]">Support</a>
          </li>
        </ul>
      </nav>

      <!-- Right Side -->
      <div class="lg:mt-0 gap-6 items-center flex mt-7">
        <div
          class="lg:static mr-[0.375rem] right-[4.25rem] top-[0.625rem] absolute !visible">
          <label class="block m-0 relative">
            <!-- Icon Sun -->
            <svg
              width="25"
              height="25"
              viewBox="0 0 25 25"
              fill="#ffffff"
              xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12.0908 18.6363C10.3549 18.6363 8.69 17.9467 7.46249 16.7192C6.23497 15.4916 5.54537 13.8268 5.54537 12.0908C5.54537 10.3549 6.23497 8.69 7.46249 7.46249C8.69 6.23497 10.3549 5.54537 12.0908 5.54537C13.8268 5.54537 15.4916 6.23497 16.7192 7.46249C17.9467 8.69 18.6363 10.3549 18.6363 12.0908C18.6363 13.8268 17.9467 15.4916 16.7192 16.7192C15.4916 17.9467 13.8268 18.6363 12.0908 18.6363ZM12.0908 16.4545C13.2481 16.4545 14.358 15.9947 15.1764 15.1764C15.9947 14.358 16.4545 13.2481 16.4545 12.0908C16.4545 10.9335 15.9947 9.8236 15.1764 9.00526C14.358 8.18692 13.2481 7.72718 12.0908 7.72718C10.9335 7.72718 9.8236 8.18692 9.00526 9.00526C8.18692 9.8236 7.72718 10.9335 7.72718 12.0908C7.72718 13.2481 8.18692 14.358 9.00526 15.1764C9.8236 15.9947 10.9335 16.4545 12.0908 16.4545ZM10.9999 0.0908203H13.1817V3.36355H10.9999V0.0908203ZM10.9999 20.8181H13.1817V24.0908H10.9999V20.8181ZM2.83446 4.377L4.377 2.83446L6.69082 5.14828L5.14828 6.69082L2.83446 4.37809V4.377ZM17.4908 19.0334L19.0334 17.4908L21.3472 19.8046L19.8046 21.3472L17.4908 19.0334ZM19.8046 2.83337L21.3472 4.377L19.0334 6.69082L17.4908 5.14828L19.8046 2.83446V2.83337ZM5.14828 17.4908L6.69082 19.0334L4.377 21.3472L2.83446 19.8046L5.14828 17.4908ZM24.0908 10.9999V13.1817H20.8181V10.9999H24.0908ZM3.36355 10.9999V13.1817H0.0908203V10.9999H3.36355Z"
                fill="" />
            </svg>
          </label>
        </div>

        <a href="#" class="font-medium text-white">Sign In</a>

        <a
          href="#"
          class="bg-[#ffffff26] text-white text-base leading-6 px-[1.87rem] py-3 rounded-full justify-center items-center flex">
          Sign Up
        </a>
      </div>
    </div>
  </div>
</header>
